backend:
  name: github
  repo: josephtasdigital/jotasdigital
  branch: main

media_folder: "public/img"
public_folder: "/img"

# Media uploads (PNG, WebP, GIF, SVG) are stored under public/img/
# and served from /img/ at runtime.

collections:
  # --- COLLECTION 1: PROFESSIONAL PORTFOLIO ---
  - name: "portfolio"
    label: "Portfolio Items"
    folder: "content/portfolio"
    create: true
    fields:
      - {label: "Project Title", name: "title", widget: "string"}
      - {label: "Asset Type", name: "type", widget: "select", options: ["Image Set", "PDF Document", "PowerPoint Embed"]}
      - {label: "Thumbnail Image", name: "thumbnail_image_url", widget: "image", required: false}
      - {label: "Main Showcase File", name: "featured_image", widget: "file"}
      - {label: "Additional Gallery", name: "gallery", widget: "list", field: {label: "Image", name: "image", widget: "image"}}
      - {label: "Description", name: "body", widget: "markdown"}

  # --- COLLECTION 2: SERVICES ---
  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    fields:
      - {label: "Service Title", name: "title", widget: "string"}
      - {label: "Tier", name: "tier", widget: "select", options: ["major", "minor", "nano"]}
      - {label: "Tier Label", name: "tier_label", widget: "string"}
      - {label: "Tier Description", name: "tier_description", widget: "string"}
      - {label: "Sort Order", name: "sort_order", widget: "number", value_type: "int"}
      - {label: "Service Image", name: "service_image", widget: "image", required: false}
      - {label: "Animated Asset (GIF/WebP/PNG)", name: "animated_asset", widget: "image", required: false, hint: "Optional animated icon (GIF, animated WebP, or PNG) shown as an overlay icon on the service card."}
      - {label: "Hover Text", name: "hover_text", widget: "string", required: false, hint: "Text shown on top of the image when hovering this service card."}
      - {label: "Notes", name: "body", widget: "markdown", required: false}

  # --- COLLECTION 5: PARTNER OFFERS ---
  - name: "partner-offers"
    label: "Partner Offers"
    folder: "content/partner-offers"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Sort Order", name: "sort_order", widget: "number", value_type: "int", required: false}
      - {label: "Notes", name: "body", widget: "markdown", required: false}

  # --- COLLECTION 3: BLOG SECTION ---
  - name: "blog"
    label: "Data Engineering Blog"
    folder: "content/blog"
    create: true
    fields:
      - {label: "Post Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Content", name: "body", widget: "markdown"}

  # --- COLLECTION 4: THE HIDDEN PLAYGROUND ---
  - name: "playground"
    label: "Project Bread (Testing)"
    folder: "content/hidden-lab"
    create: true
    fields:
      - {label: "Test Page Name", name: "title", widget: "string"}
      - {label: "GTM Custom Event Name", name: "gtm_event", widget: "string"}
      - {label: "DataLayer Payload (JSON)", name: "payload", widget: "code", default_language: "json"}
      - {label: "Lab Notes", name: "body", widget: "markdown"}



  # --- COLLECTION 6: SITE SETTINGS (Singleton-like) ---
  - name: "site-settings"
    label: "Site Settings"
    files:
      - name: "profile"
        label: "Profile Photos"
        file: "content/site-settings/profile.md"
        fields:
          - {label: "Title", name: "title", widget: "hidden", default: "Profile Photos"}
          - {label: "Hero Section Photo", name: "hero_photo", widget: "image"}
          - {label: "Contact Section Photo", name: "contact_photo", widget: "image"}
